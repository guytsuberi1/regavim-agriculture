<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול עבודה חקלאית — רגבים בנימין</title>
  <link rel="stylesheet" href="styles.css?v=18" />
</head>
<body>
  <!-- מסך התחברות (ענן) -->
  <div id="loginOverlay" class="login-overlay" style="display:none">
    <div class="login-box">
      <div class="logo" style="font-size:40px">🌱</div>
      <h2>ניהול עבודה חקלאית</h2>
      <div class="muted" style="margin-bottom:14px">רגבים בנימין · התחברות</div>
      <input id="loginEmail" type="email" placeholder="אימייל" autocomplete="username" />
      <input id="loginPass" type="password" placeholder="סיסמה" autocomplete="current-password" />
      <div id="loginErr" class="login-err"></div>
      <button id="loginBtn" class="btn" style="width:100%;justify-content:center;margin-top:8px">כניסה</button>
    </div>
  </div>

  <header class="topbar no-print">
    <div class="brand">
      <span class="logo">🌱</span>
      <h1>ניהול עבודה חקלאית · רגבים בנימין</h1>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="daily" class="active">סידור יומי</button>
      <button data-tab="weekly">תכנון שבועי</button>
      <button data-tab="billing">דרישת תשלום</button>
      <button data-tab="reports">דוחות</button>
      <button data-tab="teams">צוותים</button>
      <button data-tab="base">נתוני בסיס</button>
      <button data-tab="settings">הגדרות וגיבוי</button>
    </nav>
    <div class="status"><span id="saveStatus">נשמר מקומית</span> <span id="headerSync"></span></div>
  </header>

  <main id="view"></main>

  <!-- ספריות ומודולים (סקריפטים קלאסיים — עובד מ-file://) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="js/seed-data.js?v=18"></script>
  <script src="js/util.js?v=18"></script>
  <script src="js/store.js?v=18"></script>
  <script src="js/sync.js?v=18"></script>
  <script src="js/importExcel.js?v=18"></script>
  <script src="js/base.js?v=18"></script>
  <script src="js/weekly.js?v=18"></script>
  <script src="js/daily.js?v=18"></script>
  <script src="js/billing.js?v=18"></script>
  <script src="js/reports.js?v=18"></script>
  <script src="js/teams.js?v=18"></script>
  <script src="js/settings.js?v=18"></script>
  <script src="js/app.js?v=18"></script>
</body>
</html>
